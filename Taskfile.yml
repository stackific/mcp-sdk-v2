# Root Taskfile — the single entrypoint for the whole multi-language monorepo.
# Drives the TypeScript, Python, and C# stacks plus the shared frontend.
#
# Ports are declared here ONCE (the single source of truth) and passed to each
# process as env vars; `task stop` frees exactly this set.
#
# Quick start:
#   task setup      # install dependencies for every stack
#   task dev        # run the frontend + all stacks (switch languages live)
#   task stop       # free all dev ports
#
# Per-language dev:  task dev:ts | task dev:py | task dev:csharp
#
# https://taskfile.dev
version: '3'

vars:
  # Pinned dev tools, run on demand via `uvx` (no project-dep pollution, reproducible).
  RUFF: 'uvx ruff@0.15.17'
  VULTURE: 'uvx vulture@2.16'
  # The Python stacks ruff/vulture operate over.
  PY_DIRS: 'py-sdk/src py-sdk/tests py-mcp-server py-mcp-client'
  DEMO_PORT: 8000
  TS_MCP_SERVER_PORT: 8001
  TS_MCP_CLIENT_PORT: 8002
  TS_AUTH_PORT: 8003
  PY_MCP_SERVER_PORT: 8101
  PY_MCP_CLIENT_PORT: 8102
  PY_AUTH_PORT: 8103
  CSHARP_MCP_SERVER_PORT: 8201
  CSHARP_MCP_CLIENT_PORT: 8202
  CSHARP_AUTH_PORT: 8203
  # The full set of dev ports, derived from the above — consumed by `task stop`.
  ALL_PORTS: >-
    {{.DEMO_PORT}} {{.TS_MCP_SERVER_PORT}} {{.TS_MCP_CLIENT_PORT}} {{.TS_AUTH_PORT}}
    {{.PY_MCP_SERVER_PORT}} {{.PY_MCP_CLIENT_PORT}} {{.PY_AUTH_PORT}}
    {{.CSHARP_MCP_SERVER_PORT}} {{.CSHARP_MCP_CLIENT_PORT}} {{.CSHARP_AUTH_PORT}}

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  # ── Setup / install ──────────────────────────────────────────────────────────
  setup:
    desc: Install the pre-push git hooks + dependencies for every stack (Node/pnpm, Python/uv, .NET)
    cmds:
      - task: setup:hooks
      - task: setup:tools
      - task: setup:ts
      - task: setup:py
      - task: setup:csharp

  setup:tools:
    desc: Install local gate tools — GitHub CLI (gh) + gitleaks (secret scan) + CodeQL CLI (GHAS)
    cmds:
      - command -v gitleaks >/dev/null 2>&1 || brew install gitleaks
      - command -v gh >/dev/null 2>&1 || brew install gh
      - gh extension list 2>/dev/null | grep -q gh-codeql || gh extension install github/gh-codeql
      - gh codeql version >/dev/null

  setup:hooks:
    desc: Install the lefthook-managed git hooks (pre-push quality gate)
    cmds:
      - lefthook install

  setup:ts:
    desc: Install the TypeScript stack (pnpm; postinstall links ts-sdk + ts-mcp-server)
    cmds:
      - pnpm install

  setup:py:
    desc: Install the Python stack (uv sync for py-sdk + client + server)
    cmds:
      - task: py:sdk:install
      - task: py:server:install
      - task: py:client:install

  setup:csharp:
    desc: Restore the C# stack (dotnet restore for client + server)
    cmds:
      - dotnet restore csharp-mcp-server/csharp-mcp-server.csproj
      - dotnet restore csharp-mcp-client/csharp-mcp-client.csproj

  py:sdk:install:
    internal: true
    dir: py-sdk
    cmds: [uv sync]

  py:server:install:
    internal: true
    dir: py-mcp-server
    cmds: [uv sync]

  py:client:install:
    internal: true
    dir: py-mcp-client
    cmds: [uv sync]

  # ── Dev (run servers) ────────────────────────────────────────────────────────
  dev:
    desc: Run the frontend + all three stacks (switch languages live in the UI)
    deps:
      - frontend
      - ts:server
      - ts:client
      - py:server
      - py:client
      - csharp:server
      - csharp:client

  dev:ts:
    desc: Run the frontend + the TypeScript stack
    deps: [frontend, ts:server, ts:client]

  dev:py:
    desc: Run the frontend + the Python stack
    deps: [frontend, py:server, py:client]

  dev:csharp:
    desc: Run the frontend + the C# stack
    deps: [frontend, csharp:server, csharp:client]

  frontend:
    desc: Shared companion frontend (Vite, :8000)
    cmds:
      - pnpm --filter @stackific/mcp-demo dev

  ts:server:
    desc: TypeScript MCP server + OAuth AS (:8001 / :8003)
    env:
      MCP_PORT: '{{.TS_MCP_SERVER_PORT}}'
      AUTH_PORT: '{{.TS_AUTH_PORT}}'
    cmds:
      - pnpm --dir ts-mcp-server dev

  ts:client:
    desc: TypeScript MCP client host (:8002)
    env:
      BACKEND_PORT: '{{.TS_MCP_CLIENT_PORT}}'
      MCP_SERVER_URL: 'http://localhost:{{.TS_MCP_SERVER_PORT}}/mcp'
      AUTH_SERVER_URL: 'http://localhost:{{.TS_AUTH_PORT}}'
      DEMO_URL: 'http://localhost:{{.DEMO_PORT}}'
    cmds:
      - pnpm --filter @stackific/mcp-client-demo dev

  py:server:
    desc: Python MCP server + OAuth AS on py-sdk (FastAPI, :8101 / :8103)
    dir: py-mcp-server
    env:
      PY_MCP_SERVER_PORT: '{{.PY_MCP_SERVER_PORT}}'
      PY_AUTH_PORT: '{{.PY_AUTH_PORT}}'
      DEMO_URL: 'http://localhost:{{.DEMO_PORT}}'
    cmds:
      - uv run python main.py

  py:client:
    desc: Python MCP client host on py-sdk (FastAPI, :8102)
    dir: py-mcp-client
    env:
      PY_MCP_CLIENT_PORT: '{{.PY_MCP_CLIENT_PORT}}'
      PY_MCP_SERVER_URL: 'http://localhost:{{.PY_MCP_SERVER_PORT}}'
      PY_AUTH_SERVER_URL: 'http://localhost:{{.PY_AUTH_PORT}}'
      DEMO_URL: 'http://localhost:{{.DEMO_PORT}}'
    cmds:
      - uv run python main.py

  csharp:server:
    desc: C# MCP server + OAuth AS (Stackific.Mcp SDK, :8201 / :8203)
    dir: csharp-mcp-server
    env:
      CSHARP_MCP_SERVER_PORT: '{{.CSHARP_MCP_SERVER_PORT}}'
      CSHARP_AUTH_SERVER_PORT: '{{.CSHARP_AUTH_PORT}}'
    cmds:
      - dotnet watch run

  csharp:client:
    desc: C# MCP client host (Stackific.Mcp SDK, :8202)
    dir: csharp-mcp-client
    env:
      CSHARP_MCP_CLIENT_PORT: '{{.CSHARP_MCP_CLIENT_PORT}}'
      CSHARP_MCP_SERVER_URL: 'http://localhost:{{.CSHARP_MCP_SERVER_PORT}}'
      CSHARP_AUTH_SERVER_URL: 'http://localhost:{{.CSHARP_AUTH_PORT}}'
      DEMO_URL: 'http://localhost:{{.DEMO_PORT}}'
    cmds:
      - dotnet watch run

  # ── Stop ─────────────────────────────────────────────────────────────────────
  stop:
    desc: Stop every process listening on the monorepo's dev ports
    env:
      STOP_PORTS: '{{.ALL_PORTS}}'
    cmds:
      - node scripts/stop-ports.mjs

  # ── Test ─────────────────────────────────────────────────────────────────────
  test:
    desc: Run the test suites for every stack
    cmds:
      - task: test:ts
      - task: test:py
      - task: test:csharp

  test:csharp:
    desc: Run the Stackific.Mcp SDK test suite (xUnit)
    cmds:
      - dotnet test csharp-sdk-tests/Stackific.Mcp.Tests.csproj --nologo

  test:ts:
    desc: Run the TypeScript test suites (ts-sdk + ts-mcp-client)
    cmds:
      - pnpm --dir ts-sdk test
      - pnpm --filter @stackific/mcp-client-demo test

  test:py:
    desc: Run the Python test suites (py-sdk + py-mcp-server + py-mcp-client)
    cmds:
      - uv run --directory py-sdk pytest
      - uv run --directory py-mcp-server pytest
      - uv run --directory py-mcp-client pytest

  # ── Build / typecheck ────────────────────────────────────────────────────────
  build:
    desc: Build/compile every stack
    cmds:
      - task: build:ts
      - task: build:csharp
      - task: build:py

  build:ts:
    desc: Build the TypeScript stack (SDK emit + workspace builds)
    cmds:
      - pnpm --dir ts-sdk build
      - pnpm -r build
      - pnpm --dir ts-mcp-server typecheck

  build:csharp:
    desc: Build the whole C# stack (SDK + tests + server via the solution, then the client)
    cmds:
      - dotnet build Stackific.Mcp.slnx --nologo
      - dotnet build csharp-mcp-client/csharp-mcp-client.csproj --nologo

  build:py:
    desc: Byte-compile the Python stack (smoke check)
    cmds:
      - uv run --directory py-sdk python -m compileall -q src
      - uv run --directory py-mcp-server python -m compileall -q .
      - uv run --directory py-mcp-client python -m compileall -q .

  typecheck:
    desc: Typecheck/compile every stack without emitting artifacts
    cmds:
      - pnpm -r typecheck
      - pnpm --dir ts-sdk typecheck
      - pnpm --dir ts-mcp-server typecheck
      - dotnet build csharp-mcp-server/csharp-mcp-server.csproj --nologo
      - dotnet build csharp-mcp-client/csharp-mcp-client.csproj --nologo

  format:
    desc: Format the repo (Prettier for JS/TS/JSON/Markdown, dotnet format for C#)
    cmds:
      - task: format:ts
      - task: format:csharp

  format:ts:
    desc: Format JS/TS/JSON/Markdown with Prettier
    cmds:
      - pnpm format

  format:check:
    desc: Check formatting without writing (Prettier; .prettierignore excludes vendored code)
    cmds:
      - pnpm exec prettier --check .

  format:csharp:
    desc: Format the C# stack with dotnet format (whitespace + style + analyzer fixes, per .editorconfig)
    cmds:
      - dotnet format Stackific.Mcp.slnx
      - dotnet format csharp-mcp-client/csharp-mcp-client.csproj

  # ── Docs (auto-generate Markdown API docs for the three SDKs into docs/<lang>) ──
  docs:
    desc: Generate Markdown API docs for all three SDKs into docs/ (TypeScript, Python, C#)
    cmds:
      - task: docs:ts
      - task: docs:py
      - task: docs:csharp

  docs:ts:
    desc: 'Generate the ts-sdk API docs (TypeDoc → docs/typescript/)'
    dir: ts-sdk
    cmds:
      # typedoc.json pins the entry points + Markdown plugin and writes to ../docs/typescript.
      - pnpm exec typedoc

  docs:py:
    desc: 'Generate the py-sdk (stackific.mcp) API docs (pydoc-markdown → docs/python/)'
    dir: py-sdk
    cmds:
      - mkdir -p ../docs/python
      # pydoc-markdown does not recurse our PEP 420 namespace package on its own, so we
      # enumerate every module under stackific.mcp (dotted names) and render one combined
      # document with a table of contents.
      - |
        mods=$(cd src && find stackific/mcp -name '*.py' -not -path '*/__pycache__/*' \
          | sed -E 's#/__init__\.py$##; s#\.py$##; s#/#.#g' | sort -u)
        args=""; for m in $mods; do args="$args -m $m"; done
        uvx --from pydoc-markdown==4.8.2 pydoc-markdown -I src $args --render-toc > ../docs/python/README.md

  docs:csharp:
    desc: 'Generate the Stackific.Mcp SDK API docs (xmldocmd → docs/csharp/)'
    cmds:
      - dotnet build csharp-sdk/Stackific.Mcp.csproj --nologo
      - dotnet tool install --global xmldocmd --version 2.9.0 2>/dev/null || true
      - mkdir -p docs/csharp
      # xmldocmd ships for net6.0; run it on the installed .NET 10 runtime via a roll-forward
      # runtimeconfig that also loads the ASP.NET Core shared framework the SDK references
      # (otherwise reflecting over Stackific.Mcp.dll fails to resolve Http.Abstractions, etc.).
      - |
        TOOLDLL=$(find "$HOME/.dotnet/tools/.store/xmldocmd" -name xmldocmd.dll -path '*/tools/*' | head -1)
        dotnet exec --runtimeconfig scripts/xmldocmd.runtimeconfig.json "$TOOLDLL" \
          csharp-sdk/bin/Debug/net10.0/Stackific.Mcp.dll docs/csharp --visibility public --clean
      # xmldocmd names the assembly index Stackific.Mcp.md; rename it to README.md so GitHub
      # renders it as the folder's landing page, repointing every internal link to it.
      - |
        find docs/csharp -name '*.md' -exec perl -pi -e 's#Stackific\.Mcp\.md#README.md#g' {} +
        mv -f docs/csharp/Stackific.Mcp.md docs/csharp/README.md

  # ── Quality gate (lint / dead code / pre-push) ─────────────────────────────────
  prepush:
    desc: Run the full pre-push gate (lint → format → build → test) via lefthook
    cmds:
      - lefthook run pre-push --all-files

  secrets:
    desc: Scan tracked content for committed secrets (gitleaks; example tokens allowlisted in .gitleaks.toml)
    cmds:
      - gitleaks git . --no-banner --redact --config .gitleaks.toml

  ghas:
    desc: GitHub Advanced Security — local CodeQL security-and-quality scan for every language
    cmds:
      - mkdir -p .codeql
      - task: ghas:ts
      - task: ghas:py
      - task: ghas:csharp

  ghas:ts:
    desc: CodeQL security-and-quality over the JS/TS sources
    cmds:
      - mkdir -p .codeql
      - gh codeql database create .codeql/db-js --language=javascript-typescript --source-root=. --overwrite
      - gh codeql database analyze .codeql/db-js --download --threads=0 --format=sarif-latest --output=.codeql/js.sarif codeql/javascript-queries:codeql-suites/javascript-security-and-quality.qls

  ghas:py:
    desc: CodeQL security-and-quality over the Python sources
    cmds:
      - mkdir -p .codeql
      - gh codeql database create .codeql/db-py --language=python --source-root=. --overwrite
      - gh codeql database analyze .codeql/db-py --download --threads=0 --format=sarif-latest --output=.codeql/py.sarif codeql/python-queries:codeql-suites/python-security-and-quality.qls

  ghas:csharp:
    desc: CodeQL security-and-quality over the C# sources (needs a dotnet build trace)
    cmds:
      - mkdir -p .codeql
      - gh codeql database create .codeql/db-cs --language=csharp --command='dotnet build Stackific.Mcp.slnx --no-incremental /p:UseSharedCompilation=false' --source-root=. --overwrite
      - gh codeql database analyze .codeql/db-cs --download --threads=0 --format=sarif-latest --output=.codeql/cs.sarif codeql/csharp-queries:codeql-suites/csharp-security-and-quality.qls

  lint:
    desc: Lint every stack (Prettier check for JS/TS, Ruff for Python, dotnet format --verify for C#)
    cmds:
      - task: lint:ts
      - task: lint:py
      - task: lint:csharp

  lint:ts:
    desc: Lint JS/TS/JSON/Markdown — verify Prettier formatting without writing
    cmds:
      - pnpm exec prettier --check .

  lint:py:
    desc: Ruff static analysis over the Python stacks (unused imports/vars, redefinitions, F-rules)
    cmds:
      - '{{.RUFF}} check {{.PY_DIRS}}'

  lint:fix:
    desc: Ruff with --fix — auto-eliminates unused imports and other safe fixes (Python)
    cmds:
      - '{{.RUFF}} check --fix {{.PY_DIRS}}'

  lint:csharp:
    desc: Lint the C# stack — verify formatting + code style/analyzers against .editorconfig (fails on any diff)
    cmds:
      - dotnet format Stackific.Mcp.slnx --verify-no-changes
      - dotnet format csharp-mcp-client/csharp-mcp-client.csproj --verify-no-changes

  # ── Dead code (find unused/unreachable code; non-mutating) ──────────────────────
  deadcode:
    desc: Find dead/unused code across stacks (Knip for TS, Vulture for Python, Roslyn style analyzers for C#)
    cmds:
      - task: deadcode:ts
      - task: deadcode:py
      - task: deadcode:csharp

  deadcode:ts:
    desc: Find unused files, exports, and dependencies in the TypeScript workspaces (Knip, run via pnpm dlx)
    cmds:
      - pnpm dlx knip

  deadcode:py:
    desc: Report dead Python code (unused functions/classes/vars) via vulture — advisory
    cmds:
      - '{{.VULTURE}} py-sdk/src py-mcp-server py-mcp-client --min-confidence 80'

  deadcode:csharp:
    desc: Surface dead C# code — unused private members/fields and redundant usings — via Roslyn style analyzers
    cmds:
      # `dotnet format style` runs the IDE code-style analyzers (IDE0005 unnecessary usings, IDE0051/IDE0052
      # unused/unread private members, …); --verify-no-changes fails if any could be removed.
      - dotnet format style Stackific.Mcp.slnx --verify-no-changes --severity info
      - dotnet format style csharp-mcp-client/csharp-mcp-client.csproj --verify-no-changes --severity info
