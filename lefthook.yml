# Git hooks for the monorepo, managed by lefthook (https://lefthook.dev).
#
#   task setup     → `lefthook install`, wiring these hooks into the repo
#   task prepush   → run the whole pre-push gate on demand (`lefthook run pre-push --all-files`)
#   git push       → the pre-push gate runs automatically
#
# Hooks:
#   commit-msg → conventional-commit subject + DCO sign-off (catches a missing sign-off locally)
#   pre-commit → gitleaks secret scan of the staged diff (fast, staged-only)
#   pre-push   → secrets → lint → format → build → test, in order, fail-fast on the first failure
commit-msg:
  commands:
    conventional-dco:
      run: bash scripts/check-commit-msg.sh {1}

pre-commit:
  commands:
    # Secret scan of the staged diff (fast) — catch secrets at commit time, before push.
    secrets-staged:
      run: gitleaks protect --staged --no-banner --redact --config .gitleaks.toml

pre-push:
  piped: true
  commands:
    # Secret scan over tracked content (gitleaks; example tokens allowlisted in .gitleaks.toml).
    0_secrets:
      run: task secrets
    # Static analysis / dead-import detection (ruff over the Python stacks).
    1_lint:
      run: task lint
    # Prettier format check (JS/TS/JSON/CSS; .prettierignore excludes vendored code).
    2_format:
      run: task format:check
    # Compile / typecheck every stack.
    3_build:
      run: task build
    # Run the test suites.
    4_test:
      run: task test
